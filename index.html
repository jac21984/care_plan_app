<!DOCTYPE html>
<html lang="en">
<head>

  <title>Care Plan Builder</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Care Plan Builder</h1>
    <button id="syncBtn">Sync Resources</button>
  </header>

  <main>

    <section id="topicSection">
      <h2>Select Topics</h2>
      <div id="topicList"></div>
    </section>

    <section id="resourceSection">

      <div id="resourceList"></div>

    <section id="carePlanSection">

      <button id="generatePdfBtn">Generate PDF</button>
      <button id="emailPdfBtn">Email PDF</button>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
